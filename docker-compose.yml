services:
  mongodb:
    image: mongo:7
    container_name: qretrieve-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - qretrieve-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qretrieve-backend
    restart: unless-stopped
    ports:
      - "7600:7600"
    environment:
      - PORT=7600
      - MONGODB_URI=mongodb://mongodb:27017/qretrieve
      - BASE_URL=https://QRetrieve.arsh-io.website
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-qretrieve-production-secret-change-me}
      - JWT_EXPIRES_IN=7d
      - UPLOAD_DIR=uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - qretrieve-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qretrieve-frontend
    restart: unless-stopped
    networks:
      - qretrieve-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: qretrieve-nginx
    restart: unless-stopped
    ports:
      - "7700:7700"
    depends_on:
      - frontend
      - backend
    networks:
      - qretrieve-net

volumes:
  mongo-data:
  uploads-data:

networks:
  qretrieve-net:
    driver: bridge
